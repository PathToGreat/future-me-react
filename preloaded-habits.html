<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Me - Preloaded Habits</title>
    <style>
        :root {
            --primary-color: #6200EE;
            --secondary-color: #03DAC6;
            --background-color: #f5f5f5;
            --card-background: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-radius: 12px;
            --spacing-unit: 16px;
            --health-color: #4CAF50;
            --fitness-color: #2196F3;
            --social-color: #E91E63;
            --mental-color: #9C27B0;
            --spiritual-color: #FF9800;
            --financial-color: #FFC107;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-unit);
        }

        header {
            padding: calc(var(--spacing-unit) * 2) var(--spacing-unit);
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding-bottom: var(--spacing-unit);
            margin-bottom: var(--spacing-unit);
            gap: 10px;
        }

        .category-button {
            padding: 10px 20px;
            background-color: #e0e0e0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-button:hover {
            background-color: #d0d0d0;
        }

        .category-button.active {
            background-color: var(--primary-color);
            color: white;
        }

        .habits-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-unit);
        }

        .habit-card {
            background-color: var(--card-background);
            border-radius: var(--border-radius);
            padding: calc(var(--spacing-unit) * 1.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .habit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .habit-title {
            margin-top: 0;
            margin-bottom: calc(var(--spacing-unit) / 2);
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .habit-description {
            margin-bottom: var(--spacing-unit);
            color: var(--text-secondary);
        }

        .habit-fact {
            font-style: italic;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-top: 1px solid #eee;
            padding-top: var(--spacing-unit);
            margin-top: var(--spacing-unit);
        }

        .health { border-top: 4px solid var(--health-color); }
        .fitness { border-top: 4px solid var(--fitness-color); }
        .social { border-top: 4px solid var(--social-color); }
        .mental { border-top: 4px solid var(--mental-color); }
        .spiritual { border-top: 4px solid var(--spiritual-color); }
        .financial { border-top: 4px solid var(--financial-color); }

        @media (max-width: 768px) {
            .habits-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <h1>Future Me</h1>
        <div class="subtitle">Preloaded Habits Library</div>
    </header>

        <div class="categories" id="categories">
            <!-- Category buttons will be inserted here -->

        <div class="habits-container" id="habits-container">
            <!-- Habit cards will be inserted here -->

                factDescription: 'Faith-based study deepens spiritual understanding, provides clarity on personal values, and strengthens your foundation for making difficult decisions.',
                cssClass: 'spiritual'

            {

                category: CATEGORIES.SPIRITUAL,
                frequency: [0, 3], // Sunday, Wednesday
                factDescription: 'Spiritual community involvement provides social support, accountability, shared purpose, and opportunities for service that enhance overall well-being.',
                cssClass: 'spiritual'

            // Financial & Productivity Habits
            {
                title: 'Daily Budget Check-in',
                description: 'Review spending and savings goals',
                category: CATEGORIES.FINANCIAL,
                frequency: [0, 1, 2, 3, 4, 5, 6], // every day
                factDescription: 'Daily budget awareness reduces impulsive spending, accelerates debt repayment, and helps build emergency savings that reduce financial stress.',
                cssClass: 'financial'
            },
            {
                title: 'Work on a Skill',
                description: 'Learn something new to improve career/business',
                category: CATEGORIES.FINANCIAL,
                frequency: [1, 2, 3, 4, 5], // Weekdays
                factDescription: 'Continuous skill development increases earning potential, makes you more valuable in your field, and provides mental stimulation that keeps your brain healthy.',
                cssClass: 'financial'

            {

                frequency: [0, 1, 2, 3, 4, 5, 6], // every day
                factDescription: 'Avoiding impulse purchases can save the average person thousands of dollars per year and leads to greater satisfaction with the purchases you do make.',

            },
            {
                title: 'Review & Plan',
                description: 'Set priorities for the next day',
                category: CATEGORIES.FINANCIAL,
                frequency: [0, 1, 2, 3, 4, 5, 6], // every day
                factDescription: 'Planning the next day improves productivity by up to 25%, reduces decision fatigue, and helps ensure important tasks are completed before urgent ones take over.',
                cssClass: 'financial'
            },
        ];

        // Get unique categories from habits
        const uniqueCategories = [...new Set(preloadedHabits.map(habit => habit.category))];
        
        // DOM elements
        const categoriesContainer = document.getElementById('categories');
        const habitsContainer = document.getElementById('habits-container');
        
        // Initial state
        let activeCategory = uniqueCategories[0];

        // Create category buttons
        function createCategoryButtons() {
            uniqueCategories.forEach(category => {
                const button = document.createElement('button');
                button.textContent = category;
                button.className = 'category-button';
                button.dataset.category = category;
                
                if (category === activeCategory) {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    activeCategory = category;
                    updateActiveButton();
                    renderHabits();
                });
                
                categoriesContainer.appendChild(button);
            });
        }

        // Update active button
        function updateActiveButton() {
            document.querySelectorAll('.category-button').forEach(button => {
                if (button.dataset.category === activeCategory) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        // Render habits for the active category
        function renderHabits() {
            habitsContainer.innerHTML = '';
            
            const filteredHabits = preloadedHabits.filter(habit => 
                activeCategory === 'All' || habit.category === activeCategory
            );
            
            filteredHabits.forEach(habit => {
                const habitCard = document.createElement('div');
                habitCard.className = `habit-card ${habit.cssClass}`;
                
                const title = document.createElement('h3');
                title.className = 'habit-title';
                title.textContent = habit.title;
                
                const description = document.createElement('p');
                description.className = 'habit-description';
                description.textContent = habit.description;
                
                const fact = document.createElement('div');
                fact.className = 'habit-fact';
                fact.textContent = habit.factDescription;
                
                habitCard.appendChild(title);
                habitCard.appendChild(description);
                habitCard.appendChild(fact);
                
                habitsContainer.appendChild(habitCard);
            });
        }

        // Initialize the application
        function init() {
            // Add "All" category at the beginning
            uniqueCategories.unshift('All');
            createCategoryButtons();
            renderHabits();
        }

        // Start the app
        init();
    </script>
</body>
</html>
