<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Me - Simple React Native</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Production React and React DOM -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- React Native Web -->
  <script crossorigin src="https://unpkg.com/react-native-web@0.19.0/dist/index.js"></script>
  
  <script>
    // Simple React Native component
    const { View, Text, StyleSheet } = ReactNative;
    
    function SimpleApp() {
      return React.createElement(
        View, 
        { style: styles.container },
        [
          React.createElement(Text, { style: styles.title, key: 'title' }, "Future Me"),
          React.createElement(Text, { style: styles.subtitle, key: 'subtitle' }, "Simple Test - HTML Version"),
          React.createElement(Text, { style: styles.body, key: 'body' }, 
            "This is a simplified version of the Future Me app rendered directly in HTML with React Native Web."
          )
        ]
      );
    }
    
    const styles = StyleSheet.create({
      container: {
        flex: 1,
        backgroundColor: '#f5f5f5',
        alignItems: 'center',
        justifyContent: 'center',
        padding: 20,
      },
      title: {
        fontSize: 28,
        fontWeight: 'bold',
        color: '#333',
        marginBottom: 10,
      },
      subtitle: {
        fontSize: 18,
        color: '#666',
        marginBottom: 20,
      },
      body: {
        fontSize: 16,
        color: '#444',
        textAlign: 'center',
        lineHeight: 24,
      },
    });
    
    // Render the app
    const app = React.createElement(SimpleApp);
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(app);
  </script>
</body>
</html>
