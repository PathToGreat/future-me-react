<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Me - App Navigation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f5;
            color: #333333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            color: #6200EE;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #666666;
            margin-bottom: 40px;
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .nav-button {
            background-color: #6200EE;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: block;
        }
        
        .nav-button:hover {
            background-color: #3700B3;
        }
        
        .nav-button.secondary {
            background-color: white;
            color: #6200EE;
            border: 2px solid #6200EE;
        }
        
        .nav-button.secondary:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Future Me</h1>
        <p class="subtitle">Choose which version you'd like to view:</p>
        
        <div class="button-container">
            <a href="index.html" class="nav-button">Main Application</a>
            <a href="investor-demo.html" class="nav-button">Investor Preview</a>
            <a href="investor-view.html" class="nav-button secondary">Investor View (Alternative)</a>
        </div>
    </div>
</body>
</html>
