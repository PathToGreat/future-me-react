<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-color: #fff;
    }
    .heading {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .paragraph {
      font-size: 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    .button {
      background-color: #6200EE;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="heading">Future Me Test</h1>
    <p class="paragraph">Simple test application to verify rendering.</p>
    <button class="button" onclick="alert('Button pressed!')">Press me</button>
  </div>
</body>
</html>
