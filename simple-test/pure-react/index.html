<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Native Web Minimal Test</title>
  <!-- Load React and React Native Web directly from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-native-web@0.19.0/dist/index.js" crossorigin></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #f5f5f5;
    }
    #root {
      display: flex;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Using the global React and ReactNative objects provided by the CDN
    const {createElement: h} = React;
    const {View, Text, Button, StyleSheet} = ReactNativeWeb;
    
    function App() {
      const [count, setCount] = React.useState(0);
      
      return h(
        View, 
        {style: styles.container},
        h(Text, {style: styles.title}, "Pure HTML React Native Web Test"),
        h(Text, {style: styles.counter}, `Count: ${count}`),
        h(Button, {
          title: "Increment",
          onPress: () => setCount(count + 1),
          color: "#4a00e0"
        })
      );
    }
    
    const styles = StyleSheet.create({
      container: {
        flex: 1,
        alignItems: 'center',
        justifyContent: 'center',
        backgroundColor: '#f0f0f0',
        padding: 20,
      },
      title: {
        fontSize: 24,
        fontWeight: 'bold',
        marginBottom: 20,
        color: '#333',
      },
      counter: {
        fontSize: 18,
        marginBottom: 20,
        color: '#666',
      },
    });
    
    // Render the App to the root div
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
    
    console.log("React Native Web test script loaded and executed.");
  </script>
</body>
</html>
