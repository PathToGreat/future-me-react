            {

                category: CATEGORIES.FINANCIAL,
                frequency: [0, 1, 2, 3, 4, 5, 6], // every day

                factDescription: "Planning the next day improves productivity by up to 25%, reduces decision fatigue, and helps ensure important tasks are completed before urgent ones take over."
            }

        // Organize habits by category
        function groupHabitsByCategory(habits) {
            const result = {};
            habits.forEach(habit => {
                const category = habit.category;
                if (!result[category]) {
                    result[category] = [];
                }
                result[category].push(habit);
            });
            return result;
        }

        // Render habits in the UI
        function renderHabits() {
            const container = document.getElementById('habits-container');
            const habitsByCategory = groupHabitsByCategory(preloadedHabits);
            
            // Get category class name
            function getCategoryClass(category) {
                if (category === CATEGORIES.HEALTH) return 'health';
                if (category === CATEGORIES.FITNESS) return 'fitness';
                if (category === CATEGORIES.SOCIAL) return 'social';
                if (category === CATEGORIES.MENTAL) return 'mental';
                if (category === CATEGORIES.SPIRITUAL) return 'spiritual';
                if (category === CATEGORIES.FINANCIAL) return 'financial';
                return '';
            }
            
            // Render each category
            Object.entries(habitsByCategory).forEach(([category, habits]) => {
                const categoryEl = document.createElement('div');
                categoryEl.className = `category ${getCategoryClass(category)}`;
                
                const titleEl = document.createElement('div');
                titleEl.className = 'category-title';
                titleEl.textContent = category;
                categoryEl.appendChild(titleEl);
                
                // Render habits in this category
                habits.forEach(habit => {
                    const habitEl = document.createElement('div');
                    habitEl.className = 'habit-item';
                    
                    const titleEl = document.createElement('div');
                    titleEl.className = 'habit-title';
                    titleEl.textContent = habit.title;
                    habitEl.appendChild(titleEl);
                    
                    const descEl = document.createElement('div');
                    descEl.className = 'habit-description';
                    descEl.textContent = habit.description;
                    habitEl.appendChild(descEl);
                    
                    const factEl = document.createElement('div');
                    factEl.className = 'habit-fact';
                    factEl.textContent = habit.factDescription;
                    habitEl.appendChild(factEl);
                    
                    categoryEl.appendChild(habitEl);
                });
                
                container.appendChild(categoryEl);
            });
        }
        
        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            renderHabits();
            console.log(`Rendered ${preloadedHabits.length} habits in ${Object.keys(CATEGORIES).length} categories`);
        });
